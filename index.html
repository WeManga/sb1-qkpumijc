    <style>
      #creathings-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #070b0f;
        overflow: hidden;
        transition: opacity 650ms ease, visibility 650ms ease;
      }

      #creathings-splash.creathings-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .creathings-splash-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        animation: creathingsSplashIn 900ms ease both;
      }

      @keyframes creathingsSplashIn {
        from {
          opacity: 0;
          transform: scale(1.015);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div id="creathings-splash">
      <img
        src="/images/creathings-splash.png"
        alt="CréaTHINGS - Think. Create. Share."
        class="creathings-splash-image"
      />
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
