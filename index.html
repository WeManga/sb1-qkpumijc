<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

    <title>Invit Studio</title>

    <meta name="theme-color" content="#f7f2ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Invit Studio">

    <link rel="icon" type="image/png" href="https://njvnmribopknrqvtjkup.supabase.co/storage/v1/object/public/invitations/nouveau%20logo.PNG?v=1" />
    <link rel="apple-touch-icon" href="https://njvnmribopknrqvtjkup.supabase.co/storage/v1/object/public/invitations/nouveau%20logo.PNG?v=1" />

    <meta property="og:title" content="Invit Studio" />
    <meta property="og:description" content="Créez des invitations digitales inoubliables" />
    <meta property="og:image" content="https://njvnmribopknrqvtjkup.supabase.co/storage/v1/object/public/invitations/nouveau%20logo.PNG" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://njvnmribopknrqvtjkup.supabase.co/storage/v1/object/public/invitations/nouveau%20logo.PNG" />

    <script>
      (function () {
        var path = window.location.pathname || '';
        var isAndroid = /Android/i.test(window.navigator.userAgent);

        if (path.indexOf('/invite/') === 0) {
          document.documentElement.classList.add('no-splash');
        }

        if (isAndroid) {
          document.documentElement.classList.add('is-android');
        }
      })();
    </script>

    <style>
      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
        background: #f7f2ea;
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
      }

      html.no-splash #creathings-splash {
        display: none !important;
      }

      html.is-android #creathings-splash {
        display: none !important;
      }

      #creathings-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(199, 160, 104, 0.28), transparent 34%),
          radial-gradient(circle at 84% 24%, rgba(244, 114, 182, 0.16), transparent 30%),
          radial-gradient(circle at 50% 86%, rgba(251, 191, 36, 0.20), transparent 36%),
          linear-gradient(135deg, #fffaf2 0%, #f7f2ea 38%, #efe7da 100%);
        transition: opacity 650ms ease, visibility 650ms ease;
      }

      #creathings-splash::before {
        content: "";
        position: absolute;
        inset: -35%;
        background:
          linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.55) 46%, transparent 62%);
        animation: creathingsLight 2200ms ease-in-out infinite;
        opacity: 0.75;
      }

      #creathings-splash::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 30% 72%, rgba(255, 255, 255, 0.55) 0 1px, transparent 1.5px),
          radial-gradient(circle at 64% 28%, rgba(199, 160, 104, 0.38) 0 1px, transparent 1.5px),
          radial-gradient(circle at 76% 68%, rgba(255, 255, 255, 0.42) 0 1px, transparent 1.5px);
        background-size: 120px 120px;
        opacity: 0.7;
      }

      #creathings-splash.creathings-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .creathings-splash-content {
        position: relative;
        z-index: 2;
        width: min(88vw, 760px);
        text-align: center;
        color: #1f1b16;
        transform: translateY(-2vh);
      }

      .creathings-brand {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(3.2rem, 14vw, 7rem);
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: 0;
        color: #1f1b16;
        text-shadow: 0 10px 28px rgba(92, 62, 28, 0.14);
        white-space: nowrap;
      }

      .creathings-brand .crea {
        color: #1f1b16;
      }

      .creathings-brand .thinks {
        color: #c7a068;
        margin-left: 0.08em;
      }

      .creathings-tagline {
        margin: 18px 0 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(1.05rem, 4.4vw, 1.75rem);
        line-height: 1.2;
        font-weight: 400;
        letter-spacing: 0;
        color: rgba(31, 27, 22, 0.58);
      }

      .creathings-loader {
        width: 72px;
        height: 3px;
        margin: 34px auto 0;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(31, 27, 22, 0.10);
      }

      .creathings-loader::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c7a068, #f2d196);
        animation: creathingsLoad 1200ms ease-in-out infinite;
      }

      @media (max-width: 420px) {
        .creathings-brand {
          font-size: clamp(2.75rem, 13vw, 4.4rem);
        }

        .creathings-tagline {
          font-size: clamp(0.95rem, 4vw, 1.2rem);
        }
      }

      @keyframes creathingsLight {
        0% {
          transform: translateX(-18%) translateY(8%) rotate(0deg);
        }

        50% {
          transform: translateX(18%) translateY(-4%) rotate(4deg);
        }

        100% {
          transform: translateX(-18%) translateY(8%) rotate(0deg);
        }
      }

      @keyframes creathingsLoad {
        0% {
          transform: translateX(-110%);
        }

        50% {
          transform: translateX(70%);
        }

        100% {
          transform: translateX(250%);
        }
      }
    </style>
  </head>

  <body>
    <div id="creathings-splash">
      <div class="creathings-splash-content">
        <h1 class="creathings-brand">
          <span class="crea">Crea</span><span class="thinks">THINKS</span>
        </h1>
        <p class="creathings-tagline">Think. Create. Share.</p>
        <div class="creathings-loader"></div>
      </div>
    </div>

    <script>
      (function () {
        function hideCreathingsSplash() {
          var splash = document.getElementById('creathings-splash');

          if (!splash) return;

          splash.classList.add('creathings-hidden');

          window.setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 700);
        }

        if (window.location.pathname.indexOf('/invite/') === 0) {
          hideCreathingsSplash();
          return;
        }

        if (/Android/i.test(window.navigator.userAgent)) {
          hideCreathingsSplash();
          return;
        }

        window.addEventListener('load', function () {
          window.setTimeout(hideCreathingsSplash, 3000);
        });

        window.setTimeout(hideCreathingsSplash, 5000);
      })();
    </script>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
